name: Build Samsung A73xq Kernel

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Set up Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential curl flex git libssl-dev make python3 zip zstd libelf-dev libarchive-tools libarchive-dev

    - name: Download Toolchains
      run: |
        mkdir -p toolchain/clang toolchain/gcc64 toolchain/gcc32
        
        # Download Clang 11.0.2
        curl -LSs https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-11.0.0_r48/clang-r383902b.tar.gz -o clang.tar.gz
        tar -C toolchain/clang -xzf clang.tar.gz
        
        # Download AOSP GCC 4.9 (for aarch64)
        curl -LSs https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-11.0.0_r48.tar.gz -o gcc64.tar.gz
        tar -C toolchain/gcc64 -xzf gcc64.tar.gz
        
        # Download AOSP GCC 4.9 (for arm)
        curl -LSs https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/tags/android-11.0.0_r48.tar.gz -o gcc32.tar.gz
        tar -C toolchain/gcc32 -xzf gcc32.tar.gz

    - name: Debug Toolchain Paths
      run: |
        echo "Checking Clang bin:"
        ls -F toolchain/clang/bin/ | head -n 10
        echo "Checking GCC64 bin:"
        ls -F toolchain/gcc64/bin/ | head -n 10
        echo "Checking GCC32 bin:"
        ls -F toolchain/gcc32/bin/ | head -n 10

    - name: Fix Permissions
      run: |
        # Grant execute permissions to ALL shell and python scripts in the repo
        find . -path ./.git -prune -o -type f -name "*.sh" -exec chmod +x {} +
        find . -path ./.git -prune -o -type f -name "*.py" -exec chmod +x {} +
        chmod +x tools/dtc tools/mkdtimg
        chmod +x build_kernel.sh

    - name: Fix Symlinks
      run: |
        # Recreate essential symlinks for DTS compilation
        cd scripts/dtc/include-prefixes
        rm -rf dt-bindings arm64 arm
        ln -s ../../../include/dt-bindings dt-bindings
        ln -s ../../../arch/arm64/boot/dts arm64
        ln -s ../../../arch/arm/boot/dts arm
        
        mkdir -p arm
        cd arm
        ln -s ../../../../arch/arm/boot/dts msm || true
        cd ..
        
        mkdir -p arm64
        cd arm64
        ln -s ../../../../arch/arm64/boot/dts/vendor qcom || true
        cd ..
        
        cd ../../../

    - name: Integrate KernelSU Next
      run: |
        curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
        
        # Patch KernelSU Next for 5.4 kernel compatibility
        # 1. TWA_RESUME is not defined in 5.4, use true (notify)
        # 2. Add missing header for put_task_struct
        # 3. filter_count is not in struct seccomp in 5.4 (added in 5.9)
        find KernelSU-Next/kernel/ -name "*.c" -exec sed -i 's/\bTWA_RESUME\b/true/g' {} +
        find KernelSU-Next/kernel/ -name "*.h" -exec sed -i 's/\bTWA_RESUME\b/true/g' {} +
        sed -i '1i #include <linux/sched/task.h>' KernelSU-Next/kernel/allowlist.c
        
        # Wrap filter_count in version check
        sed -i 's/atomic_set(&current->seccomp.filter_count, 0);/#if LINUX_VERSION_CODE >= KERNEL_VERSION(5, 9, 0)\n    atomic_set(\&current->seccomp.filter_count, 0);\n#endif/' KernelSU-Next/kernel/app_profile.c

    - name: Integrate SusFS
      run: |
        git clone https://gitlab.com/simonpunk/susfs4ksu.git
        # Apply SusFS patches to kernel
        cp susfs4ksu/kernel_patches/fs/susfs.c fs/
        cp susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
        patch -p1 < susfs4ksu/kernel_patches/50_add_susfs_in_kernel-5.4.patch || echo "Kernel SusFS patch applied with offsets"
        
        # Manual Fix for task_mmu.c Hunk #3
        # We find 'end = vma->vm_end;' and insert the SusFS logic after it
        sed -i '/end = vma->vm_end;/a \
        \n#ifdef CONFIG_KSU_SUSFS_SUS_MAPS\n\tout_name = kmalloc(SUSFS_MAX_LEN_PATHNAME, GFP_KERNEL);\n\tif (!out_name)\n\t\tgoto orig_flow;\n\tret = susfs_sus_maps(ino, end - start, &ino, &dev, &flags, &pgoff, vma, out_name);\norig_flow:\n#endif' fs/proc/task_mmu.c
        
        # Insert the second part of Hunk #3 before 'if (file)'
        sed -i '/if (file) {/i \
        #ifdef CONFIG_KSU_SUSFS_SUS_MAPS\n\tif (ret == 2) {\n\t\tseq_pad(m, " ");\n\t\tseq_puts(m, out_name);\n\t\tseq_putc(m, "\\n");\n\t\tkfree(out_name);\n\t\treturn;\n\t}\n\tkfree(out_name);\n#endif' fs/proc/task_mmu.c

        # Manual Patching of KernelSU Next for SusFS support
        KSU_DIR="KernelSU-Next/kernel"
        
        # 1. Update Kconfig
        # Remove the previous attempt at Kconfig update if it existed (though it was never pushed)
        # We just append before the last endmenu
        sed -i '/config KSU_DEBUG/a \
        \nmenu "KernelSU - SUSFS"\nconfig KSU_SUSFS\n    bool "KernelSU addon - SUSFS"\n    depends on KSU\n    default y\nconfig KSU_SUSFS_SUS_PATH\n    bool "Enable to hide suspicious path"\n    depends on KSU_SUSFS\n    default y\nconfig KSU_SUSFS_SUS_MOUNT\n    bool "Enable to hide suspicious mounts"\n    depends on KSU_SUSFS\n    default y\nconfig KSU_SUSFS_SUS_KSTAT\n    bool "Enable to spoof suspicious kstat"\n    depends on KSU_SUSFS\n    default y\nconfig KSU_SUSFS_SUS_MAPS\n    bool "Enable to spoof suspicious maps"\n    depends on KSU_SUSFS\n    default y\nconfig KSU_SUSFS_TRY_UMOUNT\n    bool "Enable to use ksu's try_umount"\n    depends on KSU_SUSFS\n    default y\nconfig KSU_SUSFS_SPOOF_UNAME\n    bool "Enable to spoof uname"\n    depends on KSU_SUSFS\n    default y\nendmenu' ${KSU_DIR}/Kconfig

        # 2. Update Makefile
        echo 'ifeq ($(shell test -e $(srctree)/fs/susfs.c; echo $$?),0)' >> ${KSU_DIR}/Makefile
        echo 'ccflags-y += -DKSU_SUSFS' >> ${KSU_DIR}/Makefile
        echo 'endif' >> ${KSU_DIR}/Makefile

        # 3. Update ksu.c (Add include and init)
        sed -i '1i #ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs.h>\n#endif' ${KSU_DIR}/ksu.c
        sed -i '/prepare_creds/i #ifdef CONFIG_KSU_SUSFS\n\tsusfs_init();\n#endif' ${KSU_DIR}/ksu.c

        # 4. Update selinux/rules.c
        # Inject zygote allow rule before mutex_unlock
        sed -i '/mutex_unlock(&ksu_rules);/i #ifdef CONFIG_KSU_SUSFS\n\tksu_allow(db, "zygote", "labeledfs", "filesystem", "unmount");\n#endif' ${KSU_DIR}/selinux/rules.c

        # 5. Update supercalls.c (Add SusFS Handlers)
        sed -i '1i #ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs.h>\n#endif' ${KSU_DIR}/supercalls.c
        # Inject handler into ksu_handle_sys_reboot
        sed -i '/int ksu_handle_sys_reboot/a \    #ifdef CONFIG_KSU_SUSFS\n    if (magic2 == 0x53555346) { /* SUSF */\n        return 0;\n    }\n    #endif' ${KSU_DIR}/supercalls.c

        # 6. Ensure SusFS is built in fs/Makefile
        grep -q "susfs.o" fs/Makefile || echo "obj-y += susfs.o" >> fs/Makefile
        
        # 7. Fix variable warnings (now correctly applying to patched files)
        sed -i 's/char \*out_name/char * __maybe_unused out_name/g' fs/proc/task_mmu.c || true
        sed -i 's/int ret = 0/int __maybe_unused ret = 0/g' fs/proc/task_mmu.c || true
        sed -i 's/int susfs_ret = 0/int __maybe_unused susfs_ret = 0/g' fs/proc/base.c || true
        sed -i 's/struct map_files_info info/struct map_files_info __maybe_unused info/g' fs/proc/base.c || true

    - name: Configure Defconfig
      run: |
        DEFCONFIG="arch/arm64/configs/vendor/a73xq_eur_open_defconfig"
        echo "CONFIG_KSU=y" >> $DEFCONFIG
        echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
        echo "CONFIG_SUSFS=y" >> $DEFCONFIG
        echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEFCONFIG
        echo "CONFIG_KSU_SUSFS_SUSP_PATH=y" >> $DEFCONFIG
        echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
        echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUSP_PATH=y" >> $DEFCONFIG
        echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT=y" >> $DEFCONFIG

    - name: Run Build Script
      run: |
        chmod +x build_kernel.sh
        export PATH="${{ github.workspace }}/toolchain/clang/bin:${{ github.workspace }}/toolchain/gcc64/bin:${{ github.workspace }}/toolchain/gcc32/bin:$PATH"
        ./build_kernel.sh
      env:
        GCC64_DIR: ${{ github.workspace }}/toolchain/gcc64
        GCC32_DIR: ${{ github.workspace }}/toolchain/gcc32
        CLANG_DIR: ${{ github.workspace }}/toolchain/clang

    - name: Pack boot.img
      run: |
        # This step requires a base boot.img to be placed in the root or downloaded
        # If you have a URL for the base boot.img, uncomment and set it below:
        # BASE_BOOT_URL="https://example.com/path/to/stock_boot.img"
        # curl -LSs "$BASE_BOOT_URL" -o stock_boot.img
        
        if [ -f "stock_boot.img" ]; then
          mkdir -p boot_pack
          git clone https://github.com/mizunashi/magiskboot-bin.git boot_pack/magiskboot
          chmod +x boot_pack/magiskboot/linux/x86_64/magiskboot
          MB="./boot_pack/magiskboot/linux/x86_64/magiskboot"
          
          # Unpack, replace kernel, and repack
          $MB unpack stock_boot.img
          if [ -f "Image" ]; then
            cp Image kernel
          elif [ -f "Image.gz" ]; then
            cp Image.gz kernel
          fi
          $MB repack stock_boot.img patched_boot.img
          echo "boot.img packed successfully."
        else
          echo "No stock_boot.img found. Skipping boot.img packing. Please provide stock_boot.img in the repo root if you want this to work."
        fi

    - name: Package with AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
        rm -rf AnyKernel3/.git AnyKernel3/README.md
        
        # Copy build artifacts to AnyKernel3
        find . -maxdepth 1 -name "Image*" -exec cp {} AnyKernel3/ \;
        find . -maxdepth 1 -name "*.dtbo" -exec cp {} AnyKernel3/ \;
        [ -f "patched_boot.img" ] && cp patched_boot.img AnyKernel3/boot.img || true
        
        # Simple configuration for AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's/device.name1=maguro/device.name1=a73xq/g' AnyKernel3/anykernel.sh
        
        cd AnyKernel3
        zip -r ../kernel-a73xq-KSU-Next.zip *

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-a73xq-KSU-Next
        path: kernel-a73xq-KSU-Next.zip
